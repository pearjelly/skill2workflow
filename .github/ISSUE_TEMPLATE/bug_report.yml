name: Bug report
description: Report a reproducible problem in the harness, CLI, DSL, runtime, editor, or docs.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for a contributor to reproduce it from a fresh checkout.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser
        - Compiler / Validator
        - Workflow DSL
        - Executor
        - Control Plane
        - Connector Runtime
        - LiteGraph Editor
        - Documentation
        - CI / Packaging
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, input files, and relevant output.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, and whether JSON or SQLite storage was used.
      placeholder: "macOS 15, Python 3.9, JSON storage"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or workflow snippets
      description: Paste minimal logs, validation output, or Workflow DSL snippets. Remove secrets.
      render: text
