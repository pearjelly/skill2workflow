name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: python -m py_compile src/skill2workflow/*.py
      - run: python scripts/package_smoke.py --work-dir /tmp/skill2workflow-package-smoke
